<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" role="img" aria-labelledby="bsTitle bsDesc" font-family="Georgia, 'Times New Roman', serif">
  <title id="bsTitle">The benefits stack, by stage of care</title>
  <desc id="bsDesc">Three stages of care and the programs that typically pay at each: living independently is covered by Medicare with Medigap or Advantage; assisted living is typically private pay, offset by VA Aid and Attendance for qualifying wartime veterans and surviving spouses; nursing home care is covered briefly by Medicare skilled days, then by Medicaid for those who qualify. Planning aligns the transitions between stages.</desc>
  <rect width="960" height="400" fill="#F7F5F0"/>
  <text x="60" y="54" font-size="26" fill="#1A1A1A">The benefits stack, <tspan font-style="italic" fill="#1F5C3D">by stage of care.</tspan></text>

  <g font-family="Arial, sans-serif" font-size="12" fill="#6E6E6E">
    <text x="60" y="104">STAGE</text>
    <text x="360" y="104">WHAT TYPICALLY PAYS</text>
  </g>

  <rect x="60" y="116" width="270" height="66" fill="#EAE6E1"/>
  <text x="84" y="144" font-size="16" fill="#1A1A1A">Living independently</text>
  <text x="84" y="165" font-size="12.5" fill="#4A4A4A" font-family="Arial, sans-serif">Health care, not long-term care</text>
  <rect x="360" y="116" width="540" height="66" fill="#FFFFFF" stroke="#D8D3CA"/>
  <text x="384" y="144" font-size="14.5" fill="#1F5C3D">Medicare + Medigap or Advantage</text>
  <text x="384" y="165" font-size="12.5" fill="#4A4A4A" font-family="Arial, sans-serif">Plan choice here matters later — networks and underwriting rules bind in a care crisis.</text>

  <rect x="60" y="196" width="270" height="66" fill="#EAE6E1"/>
  <text x="84" y="224" font-size="16" fill="#1A1A1A">Assisted living</text>
  <text x="84" y="245" font-size="12.5" fill="#4A4A4A" font-family="Arial, sans-serif">Mostly private-pay in Texas</text>
  <rect x="360" y="196" width="540" height="66" fill="#FFFFFF" stroke="#D8D3CA"/>
  <text x="384" y="224" font-size="14.5" fill="#1F5C3D">Private funds + VA Aid &amp; Attendance</text>
  <text x="384" y="245" font-size="12.5" fill="#4A4A4A" font-family="Arial, sans-serif">Wartime veterans and surviving spouses; 3-year VA look-back applies to transfers.</text>

  <rect x="60" y="276" width="270" height="66" fill="#1F5C3D"/>
  <text x="84" y="304" font-size="16" fill="#EAE6E1">Nursing home</text>
  <text x="84" y="325" font-size="12.5" fill="#EAE6E1" font-family="Arial, sans-serif" opacity="0.85">The six-figure stage</text>
  <rect x="360" y="276" width="540" height="66" fill="#FFFFFF" stroke="#1F5C3D" stroke-width="1.4"/>
  <text x="384" y="304" font-size="14.5" fill="#1F5C3D">Medicare skilled days (brief) &#8594; Medicaid</text>
  <text x="384" y="325" font-size="12.5" fill="#4A4A4A" font-family="Arial, sans-serif">Up to 100 skilled days after a qualifying stay; then Medicaid, under the 5-year look-back.</text>

  <text x="60" y="382" font-size="15" font-style="italic" fill="#1A1A1A">One plan, written before the first application — so a move that satisfies the VA doesn't sabotage Medicaid later.</text>
</svg>
