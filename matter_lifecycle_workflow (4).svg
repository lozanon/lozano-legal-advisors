<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 670" width="100%" style="max-width:680px;font-family:-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:transparent;" role="img" aria-labelledby="title desc">
  <title id="title">Solving your tax problem — Lozano Legal Advisors</title>
  <desc id="desc">Two-tier diagram. Phase 1 covers discovery and analysis from engagement through path determination, with each stage labeled by actor (We, IRS, We, Lawyer, You). Phase 2 shows the three primary resolution paths and specialty paths.</desc>

  <style>
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; }
    .title-large { font-size: 22px; font-weight: 500; fill: #FFFFFF; }
    .label-bold { font-size: 12px; font-weight: 500; fill: #FFFFFF; }
    .actor-tag { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; fill: #FFFFFF; opacity: 0.85; }
    .closer { font-size: 14px; font-weight: 500; font-style: italic; fill: #FFFFFF; }
    .footer-small { font-size: 12px; font-weight: 400; font-style: italic; fill: #FFFFFF; opacity: 0.65; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="32" text-anchor="middle" dominant-baseline="central" class="title-large">Solving your tax problem</text>
  <text x="340" y="58" text-anchor="middle" dominant-baseline="central" class="ts" style="font-style: italic;" fill="#FFFFFF" opacity="0.85">We solve the fear. We solve the problem.</text>
  <text x="340" y="76" text-anchor="middle" dominant-baseline="central" class="ts" style="font-style: italic;" fill="#FFFFFF" opacity="0.85">We stop the phone calls. We stop the levies. We stop the wage garnishments.</text>
  <text x="340" y="94" text-anchor="middle" dominant-baseline="central" class="ts" style="font-style: italic;" fill="#FFFFFF" opacity="0.85">Attorney-led representation.</text>
  <line x1="160" y1="110" x2="520" y2="110" stroke="#FFFFFF" stroke-width="0.5" opacity="0.4"/>

  <text x="10" y="130" dominant-baseline="central" class="label-bold">Phase 1 — Discovery and analysis</text>
  <text x="10" y="146" dominant-baseline="central" class="ts" style="font-style: italic;" fill="#FFFFFF" opacity="0.75">The team: We engage · IRS gives data · We get you in compliance · Lawyer analyzes · You decide</text>

  <text x="70" y="166" text-anchor="middle" dominant-baseline="central" class="actor-tag">We</text>
  <text x="205" y="166" text-anchor="middle" dominant-baseline="central" class="actor-tag">IRS</text>
  <text x="340" y="166" text-anchor="middle" dominant-baseline="central" class="actor-tag">We</text>
  <text x="475" y="166" text-anchor="middle" dominant-baseline="central" class="actor-tag">Lawyer</text>
  <text x="610" y="166" text-anchor="middle" dominant-baseline="central" class="actor-tag">You</text>

  <rect x="10" y="176" width="120" height="110" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="70" y="198" text-anchor="middle" dominant-baseline="central" class="th" fill="#04342C">Engage</text>
  <text x="70" y="218" text-anchor="middle" dominant-baseline="central" class="ts" style="font-style: italic;" fill="#085041">You are not alone</text>
  <text x="70" y="242" text-anchor="middle" dominant-baseline="central" class="ts" fill="#085041">Engagement signed</text>
  <text x="70" y="260" text-anchor="middle" dominant-baseline="central" class="ts" fill="#085041">Retainer paid</text>
  <text x="70" y="278" text-anchor="middle" dominant-baseline="central" class="ts" fill="#085041">2848 same-day</text>

  <rect x="145" y="176" width="120" height="110" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="205" y="198" text-anchor="middle" dominant-baseline="central" class="th" fill="#412402">Transcripts</text>
  <text x="205" y="218" text-anchor="middle" dominant-baseline="central" class="ts" style="font-style: italic;" fill="#633806">Know the truth</text>
  <text x="205" y="242" text-anchor="middle" dominant-baseline="central" class="ts" fill="#633806">Income</text>
  <text x="205" y="260" text-anchor="middle" dominant-baseline="central" class="ts" fill="#633806">Returns on file</text>
  <text x="205" y="278" text-anchor="middle" dominant-baseline="central" class="ts" fill="#633806">Critical dates</text>

  <rect x="280" y="176" width="120" height="110" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="340" y="198" text-anchor="middle" dominant-baseline="central" class="th" fill="#4A1B0C">Compliance</text>
  <text x="340" y="218" text-anchor="middle" dominant-baseline="central" class="ts" style="font-style: italic;" fill="#712B13">Get current first</text>
  <text x="340" y="242" text-anchor="middle" dominant-baseline="central" class="ts" fill="#712B13">Returns filed?</text>
  <text x="340" y="260" text-anchor="middle" dominant-baseline="central" class="ts" fill="#712B13">If not, file</text>
  <text x="340" y="278" text-anchor="middle" dominant-baseline="central" class="ts" fill="#712B13">Required first</text>

  <rect x="415" y="176" width="120" height="110" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="475" y="198" text-anchor="middle" dominant-baseline="central" class="th" fill="#042C53">Analysis</text>
  <text x="475" y="218" text-anchor="middle" dominant-baseline="central" class="ts" style="font-style: italic;" fill="#0C447C">See your options</text>
  <text x="475" y="242" text-anchor="middle" dominant-baseline="central" class="ts" fill="#0C447C">Form 433s</text>
  <text x="475" y="260" text-anchor="middle" dominant-baseline="central" class="ts" fill="#0C447C">What you can pay</text>
  <text x="475" y="278" text-anchor="middle" dominant-baseline="central" class="ts" fill="#0C447C">Ability to pay</text>

  <rect x="550" y="176" width="120" height="110" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="610" y="198" text-anchor="middle" dominant-baseline="central" class="th" fill="#26215C">Decide</text>
  <text x="610" y="218" text-anchor="middle" dominant-baseline="central" class="ts" style="font-style: italic;" fill="#3C3489">Pick your path</text>
  <text x="610" y="242" text-anchor="middle" dominant-baseline="central" class="ts" fill="#3C3489">Pay over time?</text>
  <text x="610" y="260" text-anchor="middle" dominant-baseline="central" class="ts" fill="#3C3489">Settle for less?</text>
  <text x="610" y="278" text-anchor="middle" dominant-baseline="central" class="ts" fill="#3C3489">Pause it all?</text>

  <line x1="131" y1="231" x2="144" y2="231" stroke="#FFFFFF" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="266" y1="231" x2="279" y2="231" stroke="#FFFFFF" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="401" y1="231" x2="414" y2="231" stroke="#FFFFFF" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="536" y1="231" x2="549" y2="231" stroke="#FFFFFF" stroke-width="1" marker-end="url(#arrow)"/>

  <path d="M 610 286 L 610 320 L 120 320 L 120 362" fill="none" stroke="#FFFFFF" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M 610 286 L 610 320 L 340 320 L 340 362" fill="none" stroke="#FFFFFF" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M 610 286 L 610 362" fill="none" stroke="#FFFFFF" stroke-width="1" marker-end="url(#arrow)"/>

  <text x="20" y="342" dominant-baseline="central" class="label-bold">Phase 2 — Your path to relief</text>

  <rect x="20" y="366" width="200" height="150" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.5"/>
  <text x="120" y="388" text-anchor="middle" dominant-baseline="central" class="th" fill="#173404">Installment agreement</text>
  <text x="120" y="408" text-anchor="middle" dominant-baseline="central" class="ts" style="font-style: italic;" fill="#27500A">If you can pay over time</text>
  <line x1="40" y1="426" x2="200" y2="426" stroke="#3B6D11" stroke-width="0.5" opacity="0.4"/>
  <text x="120" y="444" text-anchor="middle" dominant-baseline="central" class="ts" fill="#27500A">Form 9465 / 433-D</text>
  <text x="120" y="462" text-anchor="middle" dominant-baseline="central" class="ts" fill="#27500A">Monthly payments</text>
  <text x="120" y="480" text-anchor="middle" dominant-baseline="central" class="ts" fill="#27500A">Most common path</text>
  <text x="120" y="501" text-anchor="middle" dominant-baseline="central" class="ts" style="font-style: italic;" fill="#27500A">Pay over time. End it.</text>

  <rect x="240" y="366" width="200" height="150" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="1.5"/>
  <text x="340" y="388" text-anchor="middle" dominant-baseline="central" class="th" fill="#4B1528">Offer in compromise</text>
  <text x="340" y="408" text-anchor="middle" dominant-baseline="central" class="ts" style="font-style: italic;" fill="#72243E">If the math says you can't pay it all</text>
  <line x1="260" y1="426" x2="420" y2="426" stroke="#993556" stroke-width="0.5" opacity="0.4"/>
  <text x="340" y="444" text-anchor="middle" dominant-baseline="central" class="ts" fill="#72243E">Form 656 + 433-A(OIC)</text>
  <text x="340" y="462" text-anchor="middle" dominant-baseline="central" class="ts" fill="#72243E">Doubt as to collectability</text>
  <text x="340" y="480" text-anchor="middle" dominant-baseline="central" class="ts" fill="#72243E">~40% acceptance rate</text>
  <text x="340" y="501" text-anchor="middle" dominant-baseline="central" class="ts" style="font-style: italic;" fill="#72243E">Settle for less. End it.</text>

  <rect x="460" y="366" width="200" height="150" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
  <text x="560" y="388" text-anchor="middle" dominant-baseline="central" class="th" fill="#2C2C2A">Currently not collectible</text>
  <text x="560" y="408" text-anchor="middle" dominant-baseline="central" class="ts" style="font-style: italic;" fill="#444441">If genuine hardship</text>
  <line x1="480" y1="426" x2="640" y2="426" stroke="#5F5E5A" stroke-width="0.5" opacity="0.4"/>
  <text x="560" y="444" text-anchor="middle" dominant-baseline="central" class="ts" fill="#444441">Form 433-F</text>
  <text x="560" y="462" text-anchor="middle" dominant-baseline="central" class="ts" fill="#444441">Collection paused</text>
  <text x="560" y="480" text-anchor="middle" dominant-baseline="central" class="ts" fill="#444441">Collection period expired</text>
  <text x="560" y="501" text-anchor="middle" dominant-baseline="central" class="ts" style="font-style: italic;" fill="#444441">Pause everything. Breathe.</text>

  <text x="20" y="552" dominant-baseline="central" class="label-bold">Specialty paths when applicable</text>
  <rect x="20" y="564" width="640" height="44" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="579" text-anchor="middle" dominant-baseline="central" class="ts" fill="#085041">Penalty abatement · CDP hearing · IRS Appeals · Tax Court petition</text>
  <text x="340" y="597" text-anchor="middle" dominant-baseline="central" class="ts" fill="#085041">Innocent Spouse · Trust Fund defense · Lien removal</text>

  <text x="340" y="634" text-anchor="middle" dominant-baseline="central" class="closer">From the IRS at your door to a closed file. Solving the problem. Ending the fear.</text>
  <text x="340" y="656" text-anchor="middle" dominant-baseline="central" class="footer-small">IRS deadlines tracked: assessment (ASED) · collection (CSED) · refund (RSED)</text>
</svg>
